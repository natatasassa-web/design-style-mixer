<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Style Mixer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #F5F2EB;
    --surface: #EDE9E0;
    --surface-2: #E4DFD4;
    --border: #CBC5B6;
    --accent: #C8322A;
    --accent-dim: #8C1F16;
    --text: #1A1917;
    --text-dim: #5A5750;
    --text-faint: #9A9588;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    line-height: 1.6;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ────────────────────────────────────────────── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 20px;
  }

  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
  }

  header p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.1em;
    margin-top: 3px;
  }

  .header-summary {
    display: flex;
    gap: 8px;
    align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    flex-wrap: wrap;
  }

  .sel-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-faint);
    transition: all 0.15s;
    white-space: nowrap;
  }

  .sel-pill.filled {
    border-color: var(--accent-dim);
    color: var(--text-dim);
  }

  .sel-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-faint);
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .sel-dot.on { background: var(--accent); }

  .sep {
    color: var(--text-faint);
    font-size: 12px;
  }

  /* ── THREE PANELS ──────────────────────────────────────── */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    flex: 1;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
    min-height: 0;
  }

  .panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  .panel:last-child { border-right: none; }

  .panel-header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  .panel-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 4px;
  }

  .panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 12px;
    color: var(--text);
    margin-bottom: 10px;
  }

  .panel-search {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 5px 10px;
  }

  .panel-search input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    width: 100%;
  }

  .panel-search input::placeholder { color: var(--text-faint); }

  /* Category filter chips */
  .cat-chips {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }

  .cat-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.08em;
    padding: 3px 7px;
    border: 1px solid var(--border);
    color: var(--text-faint);
    cursor: pointer;
    background: var(--bg);
    transition: all 0.12s;
    white-space: nowrap;
  }

  .cat-chip:hover { color: var(--text); border-color: var(--text-dim); }
  .cat-chip.active { color: var(--accent); border-color: var(--accent-dim); background: rgba(200,50,42,0.07); }

  /* Scrollable list area */
  .panel-list {
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }

  .panel-list::-webkit-scrollbar { width: 3px; }
  .panel-list::-webkit-scrollbar-track { background: transparent; }
  .panel-list::-webkit-scrollbar-thumb { background: var(--border); }

  /* ── STYLE ITEMS ──────────────────────────────────────── */
  .group-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 11px 20px 5px;
    background: var(--bg);
    position: sticky;
    top: 0;
    border-bottom: 1px solid var(--border);
    z-index: 1;
    border-left: 2px solid transparent;
  }

  .style-item {
    padding: 11px 20px;
    border-bottom: 1px solid rgba(42,42,42,0.6);
    cursor: pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }

  .style-item:hover { background: var(--surface); }

  .style-item.selected {
    background: rgba(200,50,42,0.07);
    border-left-color: var(--accent);
  }

  .style-item-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }

  .style-item.selected .style-item-name { color: var(--accent); }

  .style-item-desc {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── MEDIUM ITEMS ─────────────────────────────────────── */
  .medium-item {
    padding: 10px 20px;
    border-bottom: 1px solid rgba(42,42,42,0.5);
    cursor: pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }

  .medium-item:hover { background: var(--surface); }

  .medium-item.selected {
    background: rgba(200,50,42,0.07);
    border-left-color: var(--accent);
  }

  .medium-item-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .medium-item.selected .medium-item-name { color: var(--accent); }

  .medium-item-desc {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  /* ── CONTEXT ITEMS ────────────────────────────────────── */
  .context-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }

  .context-item:hover { background: var(--surface); }

  .context-item.selected {
    background: rgba(200,50,42,0.07);
    border-left-color: var(--accent);
  }

  .context-item-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }

  .context-item.selected .context-item-name { color: var(--accent); }

  .context-item-desc {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* ── OUTPUT ───────────────────────────────────────────── */
  .output-section {
    background: var(--surface);
    padding: 20px 28px 20px;
    flex-shrink: 0;
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }

  .output-main {
    flex: 1;
    min-width: 0;
  }

  .output-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 8px;
  }

  .output-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-style: italic;
    color: var(--text);
    line-height: 1.85;
  }

  .output-text.empty {
    color: var(--text-faint);
    font-style: normal;
    font-size: 11px;
  }

  .output-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
  }

  .btn:hover { color: var(--text); border-color: var(--text-dim); }

  .btn.primary {
    border-color: var(--accent-dim);
    color: var(--accent);
    background: rgba(200,50,42,0.06);
  }

  .btn.primary:hover { background: rgba(200,50,42,0.12); }
  .btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

  .copy-confirm {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .copy-confirm.visible { opacity: 1; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <h1>Design Style Mixer</h1>
    <p>Style × Medium × Context → Prompt descriptor</p>
  </div>
  <div class="header-summary">
    <div class="sel-pill" id="pill1"><div class="sel-dot" id="dot1"></div><span id="sel1">Style</span></div>
    <span class="sep">×</span>
    <div class="sel-pill" id="pill2"><div class="sel-dot" id="dot2"></div><span id="sel2">Medium</span></div>
    <span class="sep">×</span>
    <div class="sel-pill" id="pill3"><div class="sel-dot" id="dot3"></div><span id="sel3">Context</span></div>
  </div>
</header>

<!-- THREE PANELS -->
<div class="panels">

  <!-- Panel 1: Style -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-label">Layer 01</div>
      <div class="panel-title">Style / Movement</div>
      <div class="panel-search">
        <span style="color:var(--text-faint);font-size:13px">⌕</span>
        <input type="text" id="styleSearch" placeholder="Search 100+ styles…" oninput="buildStyleList()">
      </div>
    </div>
    <div class="cat-chips" id="catChips">
      <div class="cat-chip active" data-cat="all" onclick="filterByCat(this)">All</div>
    </div>
    <div class="panel-list" id="styleList"></div>
  </div>

  <!-- Panel 2: Medium -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-label">Layer 02</div>
      <div class="panel-title">Medium / Technique</div>
    </div>
    <div class="panel-list" id="mediumList"></div>
  </div>

  <!-- Panel 3: Context -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-label">Layer 03</div>
      <div class="panel-title">Application Context</div>
    </div>
    <div class="panel-list" id="contextList"></div>
  </div>

</div>

<!-- OUTPUT -->
<div class="output-section">
  <div class="output-main">
    <div class="output-label">Generated Prompt</div>
    <div class="output-text empty" id="outputText">Select a style, medium, and context to generate a prompt descriptor.</div>
  </div>
  <div class="output-actions">
    <button class="btn primary" id="copyBtn" onclick="copyOutput()" disabled>Copy Prompt</button>
    <button class="btn" onclick="randomize()">Randomize</button>
    <div class="copy-confirm" id="copyConfirm">Copied ✓</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════════════════

const categories = [
  {
    id: "geometric-structural",
    label: "Geometric & Structural",
    color: "#B5862A",
    styles: [
      { name: "Bauhaus", desc: "Form follows function. No hierarchy between fine art and craft. Primary palette, geometric sans-serifs, workshop rigor translated into visual language.", tags: ["geometric", "primary colors", "functional", "grid"] },
      { name: "De Stijl", desc: "Reduction to absolute essence. Primary colors plus black and white, strict horizontal and vertical axes only. Mondrian's search for underlying universal structure.", tags: ["geometric", "primary colors", "grid", "reductive"] },
      { name: "Swiss / International Typographic Style", desc: "The grid as liberation. Asymmetric layouts governed by mathematical proportion. Helvetica, white space as active element. Müller-Brockmann's concert poster legacy.", tags: ["grid", "typographic", "functional", "modernist"] },
      { name: "Soviet Constructivism", desc: "Art serving political purpose. Diagonal axes, stark contrast, bold sans-serifs, agitprop energy. El Lissitzky and Rodchenko — function and ideology fused.", tags: ["diagonal", "political", "bold", "geometric"] },
      { name: "Suprematism", desc: "Pure geometric shapes as the highest form. Limited palette, no text hierarchy, no decoration. Malevich's Black Square as philosophical statement.", tags: ["geometric", "reductive", "pure form", "minimal"] },
      { name: "Neoclassical", desc: "Symmetry, order, column structure, Roman proportions. Design as architecture. Gravitas through proportion.", tags: ["symmetry", "historical", "formal", "serif"] },
      { name: "Modular Typography", desc: "Type built from repeated geometric units. The grid becomes the letterform. Systematic, almost mechanical in its logic.", tags: ["typographic", "grid", "systematic", "geometric"] },
      { name: "Bento Grid", desc: "Contemporary modular layout from Japanese lunch box logic. Unequal cells, information hierarchy through size, clean borders.", tags: ["grid", "modular", "contemporary", "digital"] },
      { name: "Pixel Art / 8-bit", desc: "The grid as the indivisible unit. Every form built from squares. Constraint as aesthetic. Video game heritage.", tags: ["grid", "digital", "retro", "low-res"] },
      { name: "Isometric / Technical Drawing", desc: "No vanishing points. Everything at 30 degrees. Clarity over illusion. Engineering drawing translated into design system.", tags: ["technical", "geometric", "drafting"] },
      { name: "Blueprint / Cyanotype", desc: "White lines on Prussian blue ground. Technical documentation as aesthetic. The photographic and architectural drafting tradition.", tags: ["monochromatic", "technical", "drafting", "prussian blue"] },
    ]
  },
  {
    id: "painterly-illustrative",
    label: "Painterly & Illustrative",
    color: "#4A8A4A",
    styles: [
      { name: "Baroque", desc: "Drama through chiaroscuro, dynamic composition, excess as virtue. Caravaggio's shadow logic applied to design. Nothing is still.", tags: ["dramatic", "contrast", "ornate", "historical"] },
      { name: "Tenebrism", desc: "Extreme chiaroscuro — figures emerging from absolute darkness. More radical than Baroque. Light as the only subject.", tags: ["dramatic", "contrast", "dark", "painterly"] },
      { name: "Romanticism", desc: "Emotion over reason. Sublime landscape, heroic figures, atmosphere of longing. Fantasy adjacent, cinematic in scale.", tags: ["atmospheric", "emotional", "painterly", "fantasy"] },
      { name: "Pointillism", desc: "Color built from discrete dots of pure pigment. The eye mixes. Optical mixing as design principle. Seurat's systematic approach to light.", tags: ["texture", "optical", "systematic", "painterly"] },
      { name: "Pop Art", desc: "Commercial imagery as fine art. Ben-Day dots, flat color, bold outlines, celebrity and product as equal subjects. Warhol's deadpan.", tags: ["bold", "flat", "commercial", "ironic"] },
      { name: "Naive / Folk Art", desc: "Untrained hand as authentic voice. Proportional inconsistency, flat perspective, vivid color without sophistication. Sincerity over skill.", tags: ["hand-drawn", "flat", "sincere", "vernacular"] },
      { name: "Outsider Art", desc: "Obsessive hand-drawn detail, repetitive marks, singular vision unconcerned with convention. Driven by internal logic invisible to others.", tags: ["hand-drawn", "obsessive", "raw", "singular"] },
      { name: "Rubberhose Animation", desc: "1920s–30s animation aesthetic. Boneless limbs, pie-cut eyes, everything rounded and elastic. Fleischer Studios energy.", tags: ["animation", "rounded", "vintage", "playful"] },
      { name: "Anime / Mecha", desc: "Hyper-detailed mechanical design, speed lines, dramatic energy bursts. Akira and Gundam end of the spectrum — kinetic and complex.", tags: ["japanese", "kinetic", "detailed", "dramatic"] },
    ]
  },
  {
    id: "historical-ornamental",
    label: "Historical & Ornamental",
    color: "#2E6E9E",
    styles: [
      { name: "Art Nouveau", desc: "Nature as structure. Sinuous organic line, botanical forms as architecture. Mucha, Guimard, total design philosophy.", tags: ["organic", "ornate", "botanical", "curved"] },
      { name: "Art Deco", desc: "Modernity with luxury. Geometric ornament, chrome and gold, sunburst motifs, speed as decorative principle. Machine age beauty.", tags: ["geometric", "luxury", "symmetry", "ornate"] },
      { name: "Victorian", desc: "Maximum ornament as evidence of civilization. Gothic revival, pattern on pattern, typographic excess. No surface left undecorated.", tags: ["ornate", "historical", "typographic", "dense"] },
      { name: "Acanthus / Filigree", desc: "Metalwork logic translated into line. Intricate interlaced forms. The leaf that built Western ornament — from Greek through Renaissance.", tags: ["intricate", "line", "ornate", "delicate"] },
      { name: "Chinoiserie", desc: "European fantasy of Chinese visual culture. Pagodas, willow pattern, lacquerwork logic, blue and white palette.", tags: ["ornate", "historical", "blue-white", "pattern"] },
      { name: "Gothic / Future Medieval", desc: "Black letter type, pointed arch logic, illuminated manuscript energy. Darkness and gold as the fundamental contrast.", tags: ["typographic", "dark", "ornate", "historical"] },
      { name: "Rococo", desc: "Extreme ornamental complexity, asymmetric shell and scroll motifs, pastel palette. Versailles as design brief.", tags: ["ornate", "asymmetric", "pastel", "decorative"] },
      { name: "Steampunk", desc: "Victorian aesthetic meets industrial engineering fantasy. Brass gears, riveted metal, anachronistic technology in period illustration style.", tags: ["industrial", "vintage", "mechanical", "ornate"] },
      { name: "Nautical Heritage", desc: "Rope, anchor, compass rose, signal flag system. Maritime documentation as aesthetic. Navy heritage translated into graphic language.", tags: ["heritage", "technical", "americana", "geometric"] },
    ]
  },
  {
    id: "japanese-east-asian",
    label: "Japanese & East Asian",
    color: "#9E3A72",
    styles: [
      { name: "Meiji-Taisho Ephemera", desc: "The collision of ukiyo-e flatness with Western lithography. Kuchi-e frontispieces, matchbox labels, export ware hybrids. Visual negotiation between two worlds.", tags: ["japanese", "historical", "hybrid", "print"] },
      { name: "Showa — Early (1930s–40s)", desc: "Militarist period constructivist influence. Shiseido's in-house refinement. Railway travel posters completely unknown internationally.", tags: ["japanese", "historical", "advertising", "modernist"] },
      { name: "Showa — Postwar (1950s–60s)", desc: "Kamekura, Tanaka, Nippon Design Center. World-class modernism with entirely different cultural DNA from Swiss style. Tokyo 1964 Olympics.", tags: ["japanese", "modernist", "typographic", "postwar"] },
      { name: "Showa — Bubble Era (1970s–80s)", desc: "Excess expressed with Japanese precision. Parco campaigns, conceptual advertising, Muji and department store maximalism as simultaneous contradictions.", tags: ["japanese", "maximalist", "advertising", "conceptual"] },
      { name: "Ukiyo-e", desc: "Flat color fields, bold outline, cropping that implies infinite space beyond the frame. The Western world's first encounter with Japanese visual logic.", tags: ["japanese", "flat", "woodblock", "historical"] },
      { name: "Japandi", desc: "Japanese wabi-sabi meets Scandinavian functionalism. Natural materials, extreme restraint, imperfection valued over perfection.", tags: ["minimal", "natural", "restrained", "contemporary"] },
      { name: "Mingei / Folk Craft", desc: "Yanagi Soetsu's philosophy — beauty in anonymous craft objects. Rough texture, natural dye palette, hand-made irregularity as virtue.", tags: ["japanese", "folk", "textural", "craft"] },
      { name: "Gutai / Japanese Avant-Garde", desc: "Post-war radical experimentation — performance, destruction, material. Almost unknown in Western design discourse.", tags: ["japanese", "experimental", "raw", "avant-garde"] },
      { name: "Chirimen-e / Kuchi-e", desc: "Meiji crepe paper prints and Taisho woodblock novel frontispieces. Delicate, layered, negotiating between two visual worlds simultaneously.", tags: ["japanese", "historical", "print", "delicate"] },
    ]
  },
  {
    id: "texture-material",
    label: "Texture & Material",
    color: "#6A48A8",
    styles: [
      { name: "Risograph", desc: "Two-color soy ink printing. Misregistration, dot screen texture, colors that knock out rather than mix. The warmth of mechanical imperfection.", tags: ["print", "texture", "limited-color", "analog"] },
      { name: "Letterpress / Relief Print", desc: "Impression into paper. The deboss as evidence of force. Ink spread at edges. Physical contact between type and substrate leaving trace.", tags: ["print", "tactile", "analog", "typographic"] },
      { name: "Scrapbook / Mixed Media", desc: "Layered ephemera, torn edges, washi tape logic. Personal archive as aesthetic. Accumulation as composition.", tags: ["collage", "mixed-media", "textural", "layered"] },
      { name: "Holographic / Iridescent", desc: "Color that shifts with viewing angle. Chrome rainbow, oil-slick surface, laser foil logic. Light itself as the medium.", tags: ["color-shift", "metallic", "contemporary"] },
      { name: "Glassmorphism", desc: "Frosted glass as UI metaphor. Translucency, blur, layered depth. Material honesty of glass translated into digital surface.", tags: ["translucent", "digital", "layered", "contemporary"] },
      { name: "Claymorphism", desc: "Inflated, soft 3D forms with clay-like surface quality. Soft shadows, rounded everything, pastel palette.", tags: ["3d", "soft", "rounded", "digital"] },
      { name: "Liquid / Abstract Flow", desc: "Fluid dynamics as compositional logic. Ink in water, marbling, lava lamp movement frozen. Organic but not botanical.", tags: ["organic", "fluid", "abstract", "textural"] },
      { name: "Shabby Chic", desc: "Deliberate distressing. Faded palette, peeling surfaces, lace and vintage florals. Decay aestheticized.", tags: ["vintage", "distressed", "soft", "feminine"] },
      { name: "Farmhouse / Cottagecore", desc: "Rural nostalgia. Botanical illustration adjacent, linen texture, hand-lettered script, mason jar sincerity.", tags: ["botanical", "vintage", "hand-drawn", "pastoral"] },
    ]
  },
  {
    id: "digital-internet",
    label: "Digital & Internet Native",
    color: "#A0622A",
    styles: [
      { name: "Vaporwave", desc: "Nostalgia for a future that never arrived. Pastel gradients, Greco-Roman sculpture, Windows 95 UI artifacts, Japanese text as decoration.", tags: ["retro-digital", "pastel", "nostalgic", "layered"] },
      { name: "Synthwave", desc: "1980s sci-fi future imagined in the present. Grid perspective, neon on black, sun setting into ocean horizon, chrome letterforms.", tags: ["retro-digital", "neon", "dark", "grid"] },
      { name: "Y2K", desc: "Turn-of-millennium optimism. Chrome, translucency, alien forms, inflated 3D, the visual language of the dot-com era.", tags: ["retro-digital", "chrome", "3d", "optimistic"] },

let selectedStyle = null;

function buildCatChips() {
  const container = document.getElementById('catChips');
  categories.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'cat-chip';
    chip.dataset.cat = cat.id;
    chip.textContent = cat.label;
    chip.onclick = function() { filterByCat(this); };
    container.appendChild(chip);
  });
}

function buildStyleList() {
  const list = document.getElementById('styleList');
  const q = document.getElementById('styleSearch').value.toLowerCase().trim();
  list.innerHTML = '';

  categories.forEach(cat => {
    if (activeCat !== 'all' && cat.id !== activeCat) return;

    const visibleStyles = cat.styles.filter(s => {
      if (!q) return true;
      return s.name.toLowerCase().includes(q) ||
             s.desc.toLowerCase().includes(q) ||
             s.tags.some(t => t.includes(q));
    });

    if (visibleStyles.length === 0) return;

    if (activeCat === 'all') {
      const groupLabel = document.createElement('div');
      groupLabel.className = 'group-label';
      groupLabel.textContent = cat.label;
      groupLabel.style.borderLeftColor = cat.color;
      list.appendChild(groupLabel);
    }

    visibleStyles.forEach(style => {
      const item = document.createElement('div');
      item.className = 'style-item';
      if (selectedStyle && selectedStyle.name === style.name) item.classList.add('selected');
      item.innerHTML = `<div class="style-item-name">${style.name}</div><div class="style-item-desc">${style.desc}</div>`;
      item.onclick = () => selectStyle(style, cat);
      list.appendChild(item);
    });
  });
}

function buildMediumList() {
  const list = document.getElementById('mediumList');
  list.innerHTML = '';

  mediumGroups.forEach(group => {
    const label = document.createElement('div');
    label.className = 'group-label';
    label.textContent = group.group;
    list.appendChild(label);

    group.items.forEach(medium => {
      const item = document.createElement('div');
      item.className = 'medium-item';
      if (selectedMedium && selectedMedium.name === medium.name) item.classList.add('selected');
      item.innerHTML = `<div class="medium-item-name">${medium.name}</div><div class="medium-item-desc">${medium.desc}</div>`;
      item.onclick = () => selectMedium(medium);
      list.appendChild(item);
    });
  });
}

function buildContextList() {
  const list = document.getElementById('contextList');
  list.innerHTML = '';

  contexts.forEach(ctx => {
    const item = document.createElement('div');
    item.className = 'context-item';
    if (selectedContext && selectedContext.name === ctx.name) item.classList.add('selected');
    item.innerHTML = `<div class="context-item-name">${ctx.name}</div><div class="context-item-desc">${ctx.desc}</div>`;
    item.onclick = () => selectContext(ctx);
    list.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════════════════════════

function filterByCat(el) {
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeCat = el.dataset.cat;
  buildStyleList();
}

function selectStyle(style, cat) {
  selectedStyle = { ...style, catColor: cat.color, catLabel: cat.label };
  buildStyleList();
  updateSummary();
  generatePrompt();
}

function selectMedium(medium) {
  selectedMedium = medium;
  buildMediumList();
  updateSummary();
  generatePrompt();
}

function selectContext(ctx) {
  selectedContext = ctx;
  buildContextList();
  updateSummary();
  generatePrompt();
}

function updateSummary() {
  const update = (dotId, selId, pillId, val) => {
    const dot = document.getElementById(dotId);
    const sel = document.getElementById(selId);
    const pill = document.getElementById(pillId);
    if (val) {
      dot.classList.add('on');
      sel.textContent = val;
      pill.classList.add('filled');
    }
  };
  if (selectedStyle) update('dot1', 'sel1', 'pill1', selectedStyle.name);
  if (selectedMedium) update('dot2', 'sel2', 'pill2', selectedMedium.name);
  if (selectedContext) update('dot3', 'sel3', 'pill3', selectedContext.name);
}

function getMediumNote(styleName, mediumName) {
  const s = styleName.toLowerCase();
  const m = mediumName.toLowerCase();
  if ((s.includes('swiss') || s.includes('de stijl')) && m.includes('letterpress'))
    return "The grid survives the impression — rigour made tactile.";
  if (s.includes('bauhaus') && m.includes('screen print'))
    return "Workshop philosophy, workshop process — one in the same.";
  if ((s.includes('showa') || s.includes('meiji')) && m.includes('offset'))
    return "Commercial print process historically authentic to the period.";
  if ((s.includes('botanical') || s.includes('apothecary') || s.includes('entomolog') || s.includes('anatomical')) && m.includes('engraving'))
    return "Medium and subject historically inseparable — the line that had to be accurate before it could be beautiful.";
  if ((s.includes('punk') || s.includes('zine')) && (m.includes('xerox') || m.includes('mimeograph')))
    return "Medium is the message — reproduction as political act.";
  if (s.includes('ukiyo') && m.includes('woodblock'))
    return "Historically correct — flatness and line weight from the same source.";
  if ((s.includes('blueprint') || s.includes('cyanotype')) && m.includes('cyanotype'))
    return "Process and aesthetic in direct alignment.";
  if (s.includes('risograph') && m.includes('risograph'))
    return "Style and process unified — the imperfection is the point.";
  if (s.includes('glitch') && m.includes('glitch'))
    return "Corruption as both method and subject.";
  if (s.includes('vaporwave') && m.includes('duotone'))
    return "Digital nostalgia given the constraint of physical print limitation.";
  if ((s.includes('constructivism') || s.includes('suprematism')) && m.includes('screen print'))
    return "Flat production for flat ideology — perfect alignment of means and meaning.";
  if (s.includes('pixel') && m.includes('pixel'))
    return "The grid is everything, and nothing escapes it.";
  return null;
}

function generatePrompt() {
  const outputEl = document.getElementById('outputText');
  const copyBtn = document.getElementById('copyBtn');

  if (!selectedStyle && !selectedMedium && !selectedContext) {
    outputEl.textContent = 'Select a style, medium, and context to generate a prompt descriptor.';
    outputEl.classList.add('empty');
    copyBtn.disabled = true;
    return;
  }

  const parts = [];

  if (selectedStyle) parts.push(`${selectedStyle.name} aesthetic`);
  if (selectedMedium) parts.push(mediumPhrases[selectedMedium.name] || `executed in ${selectedMedium.name.toLowerCase()}`);
  if (selectedContext) parts.push(`applied to ${selectedContext.name.toLowerCase()}`);

  let prompt = parts.join(' — ');

  if (selectedStyle) {
    const tags = selectedStyle.tags.slice(0, 4).join(', ');
    prompt += `. Key qualities: ${tags}.`;
  }

  if (selectedStyle && selectedMedium) {
    const note = getMediumNote(selectedStyle.name, selectedMedium.name);
    if (note) prompt += ` ${note}`;
  }

  outputEl.textContent = prompt;
  outputEl.classList.remove('empty');
  copyBtn.disabled = false;
}

function copyOutput() {
  const text = document.getElementById('outputText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const el = document.getElementById('copyConfirm');
    el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), 2000);
  });
}

function randomize() {
  const allStyles = [];
  categories.forEach(cat => cat.styles.forEach(s => allStyles.push({ style: s, cat })));
  const { style, cat } = allStyles[Math.floor(Math.random() * allStyles.length)];
  selectedStyle = { ...style, catColor: cat.color, catLabel: cat.label };

  const allMedia = [];
  mediumGroups.forEach(g => g.items.forEach(m => allMedia.push(m)));
  selectedMedium = allMedia[Math.floor(Math.random() * allMedia.length)];

  selectedContext = contexts[Math.floor(Math.random() * contexts.length)];

  activeCat = 'all';
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === 'all'));

  buildStyleList();
  buildMediumList();
  buildContextList();
  updateSummary();
  generatePrompt();
